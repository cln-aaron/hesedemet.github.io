  <!-- E – three bars extending right from shaft -->
  <rect x="103" y="93"  width="46" height="7"/>
  <rect x="103" y="122" width="37" height="7"/>
  <rect x="103" y="156" width="46" height="7"/>

  <!-- LEFT FLUKE -->
